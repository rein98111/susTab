<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sus Tab</title>
<style>
    /* --- 核心佈局 --- */
    body, html { margin: 0; padding: 0; height: 100%; color: white; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
    #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; filter: brightness(0.65); top: 0px; }
    .main-container { display: flex; justify-content: space-between; align-items: flex-start; height: 100vh; padding: 30px 40px; box-sizing: border-box; }
    
    /* --- 面板樣式 --- */
    .side-panel { width: 290px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; height: 85vh; display: flex; flex-direction: column; margin-top: 10px; }
    #clock { font-size: 3.5rem; font-weight: bold; }
    #date { font-size: 1.2rem; color: #ddd; margin-bottom: 8px; }
    #weather { font-size: 1.2rem; color: #00d4ff; margin-bottom: 25px; font-weight: bold; }
    
    .changelog { height: 20%; overflow-y: auto; margin-bottom: 15px; }
    .changelog h3 { font-size: 1.1rem; margin-top: 5px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
    .changelog ul { padding-left: 20px; font-size: 0.85rem; line-height: 1.5; color: rgba(255,255,255,0.9); margin: 8px 0; }

    /* --- 常用網站 (恢復所有連結) --- */
    .quick-links { flex-grow: 1; overflow-y: auto; }
    .links-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding-top: 10px; }
    .link-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; transition: 0.3s; }
    .link-icon { width: 38px; height: 38px; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 12px; margin-bottom: 5px; object-fit: contain; transition: 0.3s; }
    .link-item span { font-size: 0.65rem; color: #ccc; max-width: 55px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .link-item:hover .link-icon { background: rgba(0, 212, 255, 0.3); transform: translateY(-3px); }

    /* --- 中間搜尋 --- */
    .center-panel { flex: 1; display: flex; flex-direction: column; align-items: center; margin: 0 40px; padding-top: 10vh; }
    .search-logo { width: 240px; margin-bottom: 30px; filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.5)); }
    .custom-search-input { width: 100%; max-width: 600px; padding: 15px 25px; font-size: 1.1rem; border: none; border-radius: 30px; background: rgba(255, 255, 255, 0.95); outline: none; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); color: #333; }

    /* --- 推薦影片 (修正縮圖與標題) --- */
    .video-list-container { flex-grow: 1; overflow-y: auto; }
    .video-item { padding: 8px; margin-bottom: 12px; background: rgba(255, 255, 255, 0.05); border-radius: 12px; cursor: pointer; transition: 0.3s; }
    .video-item:hover { background: rgba(255, 255, 255, 0.1); }
    .video-item img { width: 100%; border-radius: 8px; aspect-ratio: 16/9; object-fit: cover; display: block; margin-bottom: 8px; }
    .video-title { font-size: 0.85rem; line-height: 1.3; color: #eee; height: 2.6rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    /* --- 音樂播放器 --- */
    #music-bar {
        position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
        width: 520px; height: 80px; background: rgba(15, 15, 15, 0.95); 
        backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 40px 40px 0 0; display: flex; align-items: center; 
        padding: 0 30px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
    }
    #music-bar.active { bottom: 0; }
    .music-btn-toggle {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 212, 255, 0.8); border: none; color: white;
        padding: 10px 25px; border-radius: 25px; cursor: pointer; z-index: 1001;
        font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .music-info { flex: 1; overflow: hidden; margin-right: 15px; }
    .music-title { font-size: 0.9rem; color: #00d4ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .music-controls button { background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; margin: 0 8px; }
    
    #yt-audio-player-container { position: absolute; left: -9999px; }

    /* --- 彈窗 --- */
    #video-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
    .modal-content { position: relative; width: 80%; max-width: 900px; aspect-ratio: 16/9; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
</style>
</head>
<body>

    <video autoplay muted loop id="bg-video"><source src="Video/loopmita.mp4" type="video/mp4"></video>

    <div class="main-container">
        <div class="side-panel">
            <div id="clock">00:00:00</div>
            <div id="date">載入中...</div>
            <div id="weather">正在獲取...</div>
            
            <div class="changelog">
                <h3>更新日誌</h3>
                <ul>
                    <li>恢復完整 10 組常用網站連結</li>
                    <li>恢復所有推薦影片清單</li>
                    <li>修正縮圖比例歪斜問題</li>
                    <li>強化 YouTube API 喚醒機制</li>
                </ul>
            </div>

            <div class="quick-links">
                <h3>常用網站</h3>
                <div class="links-grid" id="links-grid"></div>
            </div>
        </div>

        <div class="center-panel">
            <img src="images/susFries.png" alt="Logo" class="search-logo">
            <form action="https://www.google.com/search" method="GET" style="width:100%; max-width:600px;">
                <input type="text" name="q" class="custom-search-input" placeholder="Search Google..." autocomplete="off">
            </form>
        </div>

        <div class="side-panel">
            <h3>推薦影片</h3>
            <div class="video-list-container">
                <div class="video-item" onclick="playVideo('OTVPmjPKafw')">
                    <img src="https://img.youtube.com/vi/OTVPmjPKafw/mqdefault.jpg">
                    <div class="video-title">Keyboard + Mouse ASMR Sounds</div>
                </div>
                <div class="video-item" onclick="playVideo('3MTOKXjfdBU')">
                    <img src="https://img.youtube.com/vi/3MTOKXjfdBU/mqdefault.jpg">
                    <div class="video-title">6位數亞太盃2026 Tryout精華</div>
                </div>
                <div class="video-item" onclick="playVideo('BlQPjLFcwDM')">
                    <img src="https://img.youtube.com/vi/BlQPjLFcwDM/mqdefault.jpg">
                    <div class="video-title">Ado - Show | osu! Gameplay</div>
                </div>
                <div class="video-item" onclick="playVideo('NT_5y_iP0q8')">
                    <img src="https://img.youtube.com/vi/NT_5y_iP0q8/mqdefault.jpg">
                    <div class="video-title">bedtwL | Minecraft Server Trailer</div>
                </div>
            </div>
        </div>
    </div>

    <button class="music-btn-toggle" onclick="toggleMusicBar()">🎵 播放音樂</button>
    <div id="music-bar">
        <div class="music-info"><div class="music-title" id="music-title">播放器載入中...</div></div>
        <div class="music-controls">
            <button onclick="playMusic()">▶</button>
            <button onclick="pauseMusic()">⏸</button>
            <button onclick="nextMusic()">⏭</button>
        </div>
        <div id="yt-audio-player-container"></div>
    </div>

    <div id="video-modal" onclick="closeVideo()">
        <div class="modal-content"><iframe id="video-player" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe></div>
    </div>

    <script>
        // --- 1. 時間與天氣 ---
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('date').innerText = now.toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'short' });
        }
        setInterval(updateTime, 1000); updateTime();

        async function getRealTimeWeather() {
            try {
                const response = await fetch('https://www.7timer.info/bin/astro.php?lon=121.2&lat=24.9&ac=0&unit=metric&output=json');
                const data = await response.json();
                const temp = data.dataseries[0].temp2m;
                const sky = data.dataseries[0].cloudcover;
                let emoji = sky > 5 ? "☁️" : (sky > 2 ? "⛅" : "☀️");
                document.getElementById('weather').innerText = `桃園市 ${temp}°C ${emoji}`;
            } catch (e) { document.getElementById('weather').innerText = "桃園市 20°C ☁️"; }
        }
        getRealTimeWeather();

        // --- 2. 常用網站 (恢復所有連結) ---
        const myLinks = [
            { name: 'YouTube', url: 'https://www.youtube.com' },
            { name: 'Twitch', url: 'https://www.twitch.tv' },
            { name: 'GitHub', url: 'https://github.com' },
            { name: 'Pixiv', url: 'https://www.pixiv.net' },
            { name: 'Gemini', url: 'https://gemini.google.com' },
            { name: 'Anime', url: 'https://ani.gamer.com.tw' },
            { name: 'Threads', url: 'https://www.threads.com' },
            { name: 'susFries', url: 'https://sites.google.com/view/osufries' },
            { name: 'osu!', url: 'https://osu.ppy.sh' },
            { name: 'Bilibili', url: 'https://www.bilibili.com' }
        ];
        const linksGrid = document.getElementById('links-grid');
        myLinks.forEach(link => {
            const domain = new URL(link.url).hostname;
            linksGrid.innerHTML += `<a href="${link.url}" class="link-item" target="_blank"><img src="https://www.google.com/s2/favicons?sz=64&domain=${domain}" class="link-icon"><span>${link.name}</span></a>`;
        });

        // --- 3. 音樂播放器修復核心 ---
        let player, playerReady = false;
        const playlist = ['C-CYwNz3z8w', '8Cm-7oCq9HA', 'BI9Ue6JwJic', 'OSeSYGiDf9w', 'kqj7b59D85Y'];
        let currentTrack = 0;

        window.onYouTubeIframeAPIReady = function() {
            player = new YT.Player('yt-audio-player-container', {
                height: '0', width: '0',
                videoId: playlist[currentTrack],
                playerVars: { 'autoplay': 0, 'controls': 0, 'enablejsapi': 1, 'origin': window.location.origin },
                events: {
                    'onReady': (e) => { 
                        playerReady = true; 
                        e.target.setVolume(50);
                        document.getElementById('music-title').innerText = "播放器就緒";
                    },
                    'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) nextMusic(); }
                }
            });
        };

        function playMusic() {
            if (playerReady && player && typeof player.playVideo === 'function') {
                player.playVideo();
                document.getElementById('music-title').innerText = "BGM 播放中...";
            } else if (!window.YT) {
                loadYTScript();
            }
        }

        function loadYTScript() {
            if (document.getElementById('yt-api')) return;
            const tag = document.createElement('script');
            tag.id = 'yt-api';
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);
        }

        function pauseMusic() { if (playerReady) player.pauseVideo(); }
        function nextMusic() {
            if (playerReady) {
                currentTrack = (currentTrack + 1) % playlist.length;
                player.loadVideoById(playlist[currentTrack]);
            }
        }

        function toggleMusicBar() {
            const bar = document.getElementById('music-bar');
            const btn = document.querySelector('.music-btn-toggle');
            bar.classList.toggle('active');
            if (bar.classList.contains('active')) {
                btn.innerText = "❌ 關閉面板"; btn.style.bottom = "90px";
                if (!window.YT) loadYTScript(); else setTimeout(playMusic, 200);
            } else {
                btn.innerText = "🎵 播放音樂"; btn.style.bottom = "30px";
            }
        }

        // --- 4. 影片彈窗 ---
        function playVideo(id) {
            document.getElementById('video-player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('video-modal').style.display = 'flex';
        }
        function closeVideo() { 
            document.getElementById('video-modal').style.display = 'none'; 
            document.getElementById('video-player').src = ''; 
        }

        // 初始化載入
        loadYTScript();
    </script>
</body>
</html>

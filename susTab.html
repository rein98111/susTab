<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sus Tab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="Video/loopmita.mp4" type="video/mp4">
    </video>

    <div class="main-container">
        <div class="side-panel">
            <div id="clock">00:00:00</div>
            <div id="date">載入中...</div>
            <div id="weather">正在獲取氣溫...</div>
            
            <div class="changelog">
                <h3>更新日誌</h3>
                <ul>
                    <li>代碼結構化：拆分為 HTML/CSS/JS</li>
                    <li>圖標化常用網站捷徑</li>
                    <li>自動動態切換天氣 Emoji</li>
                    <li>新增底部隱藏式音樂播放器</li>
                </ul>
            </div>

            <div class="quick-links">
                <h3>常用網站</h3>
                <div class="links-grid" id="links-grid">
                    </div>
            </div>
        </div>

        <div class="center-panel">
            <img src="images/susFries.png" alt="Logo" class="search-logo">
            <form action="https://www.google.com/search" method="GET" style="width:100%; max-width:620px;">
                <input type="text" name="q" class="custom-search-input" placeholder="Search Google..." autocomplete="off">
            </form>
        </div>

        <div class="side-panel">
            <h3>推薦影片</h3>
            <div class="video-list-container">
                <div class="video-item" onclick="playVideo('OTVPmjPKafw')">
                    <img src="https://img.youtube.com/vi/OTVPmjPKafw/mqdefault.jpg">
                    <div class="video-title">Keyboard + Mouse ASMR</div>
                </div>
                <div class="video-item" onclick="playVideo('3MTOKXjfdBU')">
                    <img src="https://img.youtube.com/vi/3MTOKXjfdBU/mqdefault.jpg">
                    <div class="video-title">亞太盃2026 Tryout</div>
                </div>
                <div class="video-item" onclick="playVideo('BlQPjLFcwDM')">
                    <img src="https://img.youtube.com/vi/BlQPjLFcwDM/mqdefault.jpg">
                    <div class="video-title">Ado - Show | osu!</div>
                </div>
            </div>
        </div>
    </div>

    <button class="music-btn-toggle" onclick="toggleMusicBar()">🎵 播放音樂</button>
    <div id="music-bar">
        <div class="music-info">
            <div class="music-title" id="music-title">正在加載音樂...</div>
        </div>
        <div class="music-controls">
            <button onclick="player.playVideo()">▶</button>
            <button onclick="player.pauseVideo()">⏸</button>
            <button onclick="nextMusic()">⏭</button>
        </div>
        <div id="yt-audio-player"></div>
    </div>

    <div id="video-modal" onclick="closeVideo()">
        <div class="modal-content">
            <iframe id="video-player" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
